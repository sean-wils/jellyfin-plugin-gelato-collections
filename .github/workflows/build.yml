name: Build & Test

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

      - name: Publish
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          dotnet publish Jellyfin.Plugin.GelatoCollections/Jellyfin.Plugin.GelatoCollections.csproj \
            --configuration Release \
            --output ./dist \
            --no-restore

      - name: Upload release artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: Jellyfin.Plugin.GelatoCollections
          path: |
            dist/Jellyfin.Plugin.GelatoCollections.dll
            build.yaml
