<!DOCTYPE html>
<html>
<head>
    <title>Gelato Collections</title>
</head>
<body>
<div id="GelatoCollectionsConfigPage" data-role="page" class="page type-interior pluginConfigurationPage"
     data-require="emby-input,emby-button,emby-checkbox,emby-select">
    <div data-role="content">
        <div class="content-primary">
            <form id="GelatoCollectionsConfigForm">
                <div class="checkboxContainer checkboxContainer-withDescription">
                    <label class="emby-checkbox-label">
                        <input id="EnablePatcher" type="checkbox" is="emby-checkbox" />
                        <span>Enable patcher</span>
                    </label>
                    <div class="fieldDescription">Patch Gelato stub item GUIDs into BoxSet LinkedChildren on add events.</div>
                </div>
                <div class="checkboxContainer checkboxContainer-withDescription">
                    <label class="emby-checkbox-label">
                        <input id="RunRepairTaskOnStartup" type="checkbox" is="emby-checkbox" />
                        <span>Run repair task on startup</span>
                    </label>
                    <div class="fieldDescription">Automatically repair all BoxSets on Jellyfin startup.</div>
                </div>
                <div class="inputContainer">
                    <label class="inputLabel inputLabelUnfocused" for="PatchedPathPrefix">Gelato path prefix</label>
                    <input id="PatchedPathPrefix" type="text" is="emby-input" />
                    <div class="fieldDescription">Path prefix used to identify Gelato stub items. Default: gelato://</div>
                </div>
                <div>
                    <button is="emby-button" type="submit" class="raised button-submit block emby-button">
                        <span>Save</span>
                    </button>
                </div>
            </form>
        </div>
    </div>
    <script type="text/javascript">
        var GelatoCollectionsConfig = {
            pluginUniqueId: 'a3f7c2d1-84e5-4b6f-9c3a-2d1e5f8b0a4c'
        };
        document.querySelector('#GelatoCollectionsConfigPage')
            .addEventListener('pageshow', function () {
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(GelatoCollectionsConfig.pluginUniqueId).then(function (config) {
                    document.querySelector('#EnablePatcher').checked = config.EnablePatcher;
                    document.querySelector('#RunRepairTaskOnStartup').checked = config.RunRepairTaskOnStartup;
                    document.querySelector('#PatchedPathPrefix').value = config.PatchedPathPrefix;
                    Dashboard.hideLoadingMsg();
                });
            });
        document.querySelector('#GelatoCollectionsConfigForm')
            .addEventListener('submit', function (e) {
                e.preventDefault();
                Dashboard.showLoadingMsg();
                ApiClient.getPluginConfiguration(GelatoCollectionsConfig.pluginUniqueId).then(function (config) {
                    config.EnablePatcher = document.querySelector('#EnablePatcher').checked;
                    config.RunRepairTaskOnStartup = document.querySelector('#RunRepairTaskOnStartup').checked;
                    config.PatchedPathPrefix = document.querySelector('#PatchedPathPrefix').value;
                    ApiClient.updatePluginConfiguration(GelatoCollectionsConfig.pluginUniqueId, config).then(function () {
                        Dashboard.processPluginConfigurationUpdateResult();
                    });
                });
            });
    </script>
</div>
</body>
</html>
